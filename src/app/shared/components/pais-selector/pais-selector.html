<div class="relative country-selector">
  @if (selectedCountry()) {
    <div class="w-full h-11 bg-white border border-slate-200 rounded-xl pl-11 pr-4 text-[14px] flex items-center gap-2 cursor-pointer"
        (click)="clear(); $event.stopPropagation()">
      <span class="flex-1 text-sm text-foreground font-medium">{{ selectedCountry()!.name.common }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  } @else {
    <div class="relative" (click)="open($event)">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <input type="text"
             [value]="countrySearch()"
             (input)="countrySearch.set($any($event.target).value)"
             (focus)="open($event)"
             placeholder="Buscar país..."
             class="input-shadcn pr-10">
      <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 transition-transform"
             [class.rotate-180]="dropdownOpen()"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  }

  @if (dropdownOpen() && !selectedCountry()) {
    <div class="absolute z-50 w-full mt-1 bg-white border border-border rounded-xl shadow-xl overflow-hidden">
      <div class="max-h-56 overflow-y-auto">
        @if (filteredCountries().length === 0) {
          <div class="px-4 py-3 text-sm text-slate-400 text-center">Sin resultados</div>
        }
        @for (country of filteredCountries(); track country.cca2) {
          <button type="button"
                  (click)="select(country)"
                  class="w-full px-4 py-2.5 text-sm text-foreground hover:bg-orange-50 hover:text-[#f35b33] transition-colors text-left">
            {{ country.name.common }}
          </button>
        }
      </div>
    </div>
  }
</div>
