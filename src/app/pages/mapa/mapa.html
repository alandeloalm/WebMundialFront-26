<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-foreground mb-2">Mapa Interactivo</h1>
    <p class="text-muted-foreground">Explora Monterrey sede del Mundial 2026</p>
  </div>

  <div class="grid lg:grid-cols-5 gap-6">
    <div class="lg:col-span-3 rounded-2xl overflow-hidden border border-border bg-muted relative shadow-lg h-[550px]" #mapContainer>
    </div>

    <div class="lg:col-span-2 space-y-3 max-h-[550px] overflow-y-auto pr-2 custom-scrollbar">
      @for (loc of locations; track loc.id) {
        <div (click)="focusLocation(loc)"
             class="flex items-start gap-4 p-4 rounded-xl border border-border bg-card hover:bg-accent/50 hover:border-primary/30 transition-all cursor-pointer group shadow-sm">
          
          <div [ngClass]="{
            'bg-orange-500': loc.type === 'kiosk',
            'bg-yellow-500': loc.type === 'restaurant',
            'bg-blue-600': loc.type === 'transport',
            'bg-emerald-600': loc.type === 'attraction',
            'bg-violet-600': loc.type === 'museum'
          }" class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md group-hover:scale-105 transition-transform">
            <lucide-icon [name]="getIconName(loc.type)" class="w-5 h-5 text-white"></lucide-icon>
          </div>

          <div class="min-w-0">
            <h3 class="font-bold text-foreground text-sm">{{ loc.name }}</h3>
            <p class="text-xs text-muted-foreground leading-relaxed">{{ loc.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
