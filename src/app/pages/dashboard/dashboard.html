<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-in fade-in duration-700">

  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-display font-bold text-foreground mb-2">Dashboard</h1>
      <p class="text-muted-foreground font-body">Métricas generales de la experiencia Mundial 2026</p>
    </div>
    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg border border-border bg-card text-xs text-muted-foreground shadow-sm">
      <div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
      En vivo
    </div>
  </div>

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">

    <div class="flex gap-1 p-1 rounded-xl bg-muted/40 border border-border w-fit">
      @for (tab of tabs; track tab.id) {
        <button
          (click)="setTab(tab.id)"
          [class]="activeTab() === tab.id
            ? 'flex items-center gap-2 px-4 py-2 rounded-lg bg-card shadow-sm text-foreground font-medium text-sm transition-all duration-200'
            : 'flex items-center gap-2 px-4 py-2 rounded-lg text-muted-foreground hover:text-foreground text-sm transition-all duration-200'">
          <lucide-icon [name]="tab.icon" class="w-4 h-4"></lucide-icon>
          {{ tab.label }}
        </button>
      }
    </div>

    <div class="flex gap-1 p-1 rounded-xl bg-muted/40 border border-border w-fit">
      @for (f of filtros; track f.id) {
        <button
          (click)="setFiltro(f.id)"
          [class]="filtro() === f.id
            ? 'px-4 py-2 rounded-lg bg-card shadow-sm text-foreground font-medium text-sm transition-all duration-200'
            : 'px-4 py-2 rounded-lg text-muted-foreground hover:text-foreground text-sm transition-all duration-200'">
          {{ f.label }}
        </button>
      }
    </div>

  </div>

  <div class="animate-in fade-in duration-300">
    @switch (activeTab()) {
      @case ('usuarios')  { <app-tab-usuarios  [filtro]="filtro()" /> }
      @case ('campanas')  { <app-tab-campanas  [filtro]="filtro()" /> }
      @case ('comercios') { <app-tab-comercios [filtro]="filtro()" /> }
      @case ('kioskos')   { <app-tab-kioskos   [filtro]="filtro()" /> }
    }
  </div>

</div>
