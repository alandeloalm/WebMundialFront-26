<div class="min-h-screen flex w-full">
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
    <img src="/hero-mundial.jpg" alt="Mundial 2026" 
         class="absolute inset-0 w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a]/95 via-[#0f172a]/30 to-transparent"></div> 
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 overflow-y-auto">
    <div class="w-full max-w-[400px] fade-up">
      
      <div class="mb-8"> 
        <h2 class="text-3xl font-display font-bold text-[#0f172a] mb-2">
          {{ isRegister() ? 'Crear cuenta' : 'Bienvenido' }}
        </h2>
        <p class="text-slate-500 text-sm font-body">
          {{ isRegister() ? 'Regístrate para vivir la experiencia' : 'Inicia sesión para continuar' }}
        </p>
      </div>

      <button (click)="handleGoogleLogin()" 
              class="w-full flex items-center justify-center gap-3 h-11 bg-white border border-slate-200 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-all mb-6">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <div class="relative flex items-center gap-4 mb-6">
        <div class="flex-grow border-t border-slate-300"></div>
        <span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">o</span>
        <div class="flex-grow border-t border-slate-300"></div>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-3">
        
        @if (isRegister()) {
          <div class="register-fields-container space-y-3">
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <lucide-icon name="user" class="w-4 h-4 text-slate-400"></lucide-icon>
              </div>
              <input type="text" name="name" [(ngModel)]="formData.name" 
                     class="input-shadcn" placeholder="Nombre completo">
            </div>

            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <lucide-icon name="globe" class="w-4 h-4 text-slate-400"></lucide-icon>
              </div>
              <input type="text" name="nationality" [(ngModel)]="formData.nationality" 
                     class="input-shadcn" placeholder="Nacionalidad">
            </div>

            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <lucide-icon name="calendar" class="w-4 h-4 text-slate-400"></lucide-icon>
              </div>
              <input type="text" name="birthdate" [(ngModel)]="formData.birthdate" 
                     class="input-shadcn" placeholder="mm/dd/yyyy" onfocus="(this.type='date')">
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <lucide-icon name="user" class="w-4 h-4 text-slate-400"></lucide-icon>
                </div>
                <input type="text" name="gender" [(ngModel)]="formData.gender" 
                       class="input-shadcn" placeholder="Género (opcional)">
              </div>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <lucide-icon name="phone" class="w-4 h-4 text-slate-400"></lucide-icon>
                </div>
                <input type="tel" name="phone" [(ngModel)]="formData.phone" 
                       class="input-shadcn" placeholder="Teléfono (opcional)">
              </div>
            </div>
          </div>
        }

        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <lucide-icon name="mail" class="w-4 h-4 text-slate-400"></lucide-icon>
          </div>
          <input type="email" name="email" [(ngModel)]="formData.email" 
                 class="input-shadcn" placeholder="Correo electrónico">
        </div>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <lucide-icon name="lock" class="w-4 h-4 text-slate-400"></lucide-icon>
          </div>
          <input type="password" name="password" [(ngModel)]="formData.password" 
                 class="input-shadcn" placeholder="Contraseña">
        </div>

        <button type="submit" 
                class="w-full h-11 bg-[#f35b33] text-white rounded-xl font-bold text-sm shadow-md shadow-orange-500/20 hover:bg-[#e44a22] transition-all flex items-center justify-center gap-2 mt-6">
          {{ isRegister() ? 'Crear cuenta' : 'Iniciar sesión' }}
          <lucide-icon name="chevron-right" class="w-4 h-4"></lucide-icon>
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500 font-body">
        {{ isRegister() ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }} 
        <button (click)="toggleMode()" class="text-[#f35b33] font-bold hover:underline ml-1">
          {{ isRegister() ? 'Inicia sesión' : 'Regístrate' }}
        </button>
      </p>
    </div>
  </div>
</div>
